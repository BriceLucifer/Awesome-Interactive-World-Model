/* Categories list */
const categories = ["General World Model","Benchmark","Dataset","Long Video Generation","Static Memory","Dynamic Memory","Action Control","Interactive","Post-Training","Physic","Evaluation","Others"];

/* State */
let activeTag = "all";
let activeCategory = "all";
let searchQuery = "";
let activeLang = "zh";

/* Init */
function init() {
  const select = document.getElementById("categorySelect");
  categories.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    select.appendChild(opt);
  });
  select.addEventListener("change", e => { activeCategory = e.target.value; render(); });
  document.getElementById("searchInput").addEventListener("input", e => { searchQuery = e.target.value.toLowerCase(); render(); });
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTag = btn.dataset.tag;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.remove("active","active-star","active-open","active-closed");
      });
      if (activeTag === "all") btn.classList.add("active");
      else if (activeTag === "star") btn.classList.add("active-star");
      else if (activeTag === "opensource") btn.classList.add("active-open");
      else if (activeTag === "closed") btn.classList.add("active-closed");
      render();
    });
  });
  document.getElementById("langToggle").addEventListener("click", e => {
    const span = e.target.closest("span[data-lang]");
    if (!span) return;
    activeLang = span.dataset.lang;
    document.querySelectorAll("#langToggle span").forEach(s => s.classList.remove("active"));
    span.classList.add("active");
    render();
  });
  render();
}

/* Parse arxiv ID to numeric for sorting */
function arxivNumeric(id) {
  if (!id) return -1;
  const clean = id.replace(/v\d+$/, "");
  const parts = clean.split(".");
  if (parts.length === 2) return parseFloat(parts[0]) * 100000 + parseFloat(parts[1]);
  return parseFloat(clean);
}

/* Filter and sort papers */
function getFiltered() {
  let result = papers.filter(p => {
    if (activeTag !== "all" && !p.tags.includes(activeTag)) return false;
    if (activeCategory !== "all" && !p.categories.includes(activeCategory)) return false;
    if (searchQuery && !p.title.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
  result.sort((a, b) => {
    if (activeCategory !== "all") {
      const aStar = a.tags.includes("star") ? 1 : 0;
      const bStar = b.tags.includes("star") ? 1 : 0;
      if (aStar !== bStar) return bStar - aStar;
    }
    const na = arxivNumeric(a.arxivId), nb = arxivNumeric(b.arxivId);
    if (na === -1 && nb === -1) return 0;
    if (na === -1) return 1;
    if (nb === -1) return -1;
    return nb - na;
  });
  return result;
}

/* Render papers */
function render() {
  const list = document.getElementById("paperList");
  const filtered = getFiltered();
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No papers found</p></div>';
  } else {
    list.innerHTML = filtered.map(p => {
      const tagIcons = p.tags.map(t => {
        if (t === "star") return '<span class="tag" title="Classic">🌟</span>';
        if (t === "opensource") return '<span class="tag" title="Open Source">✅</span>';
        if (t === "closed") return '<span class="tag" title="Closed Source">❌️</span>';
        return "";
      }).join("");
      const descText = activeLang === "en" && p.descriptionEn ? p.descriptionEn : p.description;
      const desc = descText ? `<span class="paper-desc">${descText}</span>` : "";
      const aid = p.arxivId ? `<span class="paper-arxiv">arXiv: ${p.arxivId}</span>` : "";
      return `<div class="paper-card">
        <div class="paper-header">
          <div class="paper-tags">${tagIcons}</div>
          <a class="paper-title" href="${p.url}" target="_blank" rel="noopener">${p.title}</a>
        </div>
        <div class="paper-meta">
          ${p.categories.map(c => `<span class="paper-category" onclick="filterByCategory('${c}')">${c}</span>`).join("")}${desc}${aid}
        </div>
      </div>`;
    }).join("");
  }
  document.getElementById("statusBar").textContent = `Showing ${filtered.length} of ${papers.length} papers`;
}

function filterByCategory(cat) {
  activeCategory = cat;
  document.getElementById("categorySelect").value = cat;
  render();
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
